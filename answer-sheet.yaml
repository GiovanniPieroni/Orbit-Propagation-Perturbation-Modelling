ss_REG_Euler_CODE_1: "def Euler(y_i: np.ndarray, dt: float, tf: float, acc_function:\
  \ Callable[[np.ndarray], np.ndarray], time=False):\n    \"\"\"\n    Computes position\
  \ and velocity of the satellite using Euler integrator.\n    acc_function can be\
  \ a simple gravity model f(r) or a full RHS f(t, y).\n    \"\"\"\n    start = pytime.process_time()\n\
  \    N = int(round(tf / dt))\n    dim = N + 1\n    y = np.zeros((dim, 6))\n    y[0,\
  \ :] = y_i\n\n    # Check if acc_function is a simple gravity model f(r) or full\
  \ RHS f(t, y)\n    import inspect\n    sig = inspect.signature(acc_function)\n \
  \   is_rhs = len(sig.parameters) == 2\n\n    for t_idx in range(N):\n        if\
  \ is_rhs:\n            y_dot = acc_function(t_idx * dt, y[t_idx])\n        else:\n\
  \            acc = acc_function(y[t_idx, 0:3])\n            y_dot = np.concatenate((y[t_idx,\
  \ 3:6], acc))\n        \n        y[t_idx + 1, :] = y[t_idx, :] + y_dot * dt\n\n\
  \    elapsed = pytime.process_time() - start\n    if time:\n        return y, elapsed\n\
  \    return y\n"
