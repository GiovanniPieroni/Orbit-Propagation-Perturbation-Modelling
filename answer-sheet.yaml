ss_REG_OrbObs_OIC_10: "|\n- O1: Plot \"a_e_i_Euler.png\" shows that the semi-major\
  \ axis linearly increases of approximately 500 km, the inclination \nremains constant,\
  \ and the eccentricity exhibits near-periodic oscillations.\n- O2: Plot \"Om_SGP4_Euler.png\"\
  \ shows that the RAAN from the Euler integrator is constant and the same for every\
  \ dt used,\nwhereas SGP4 orbit's RAAN shows both a periodic behaviour and a negative\
  \ drift.\n- O3: From the plot \"GPD_SGP4_Euler.png\", the GPD increases with time\
  \ and, on the log\u2013log axes, each curve is close to a\nstraight line, with smaller\
  \ GPD values for smaller time steps. \n- O4: The plot \"E_h_pos.png\" shows that\
  \ both specific energy and specific angular momentum drift linearly during the \n\
  three orbital periods represented: the specific energy becomes less negative (its\
  \ magnitude decreases) and the specific\nangular momentum increases.\n"
ss_REG_OrbInt_OIC_15: " |\n- I1: The drift of the semi-major axis observed in O1 is\
  \ caused by the Euler integrator violating the conservation of orbital\nenergy,\
  \ as seen in O4. Since E = -mu / (2a), the semi-major axis must increase as the\
  \ specific mechanical energy \nbecomes less negative. This energy drift arises because\
  \ the Euler integrator introduces local truncation errors that \naccumulate over\
  \ time, so neither energy nor angular momentum remain constant, although they should\
  \ be conserved in the two-body\n(point-mass) problem. \n\n- I2: From O3, the nearly\
  \ straight line of CGPD versus time step on the log\u2013log plot indicates a power-law\
  \ dependence\nof the form CGPD directly proportional to dt, consistent with the\
  \ first-order global truncation error of the Euler \nmethod. Reducing the time step\
  \ therefore decreases the cumulative position error approximately proportionally\
  \ to dt. \n"
ss_REG_OrbCon_OIC_23: "|\n- Integrating with a first-order method and using a point-mass\
  \ gravitational model yields unreliable results, with \nrespect to those obtained\
  \ with SGP4 propagation, for two main reasons: truncation error and model discrepancy.\
  \ The\ntruncation error can be mitigated, but the linear reduction of CGPD with\
  \ smaller time steps implies that an extremely small\ntime step (near machine precision)\
  \ is required. On the other hand, the constant RAAN and inclination observed in\
  \ the \nEuler integration prove that the point-mass model is fundamentally insufficient\
  \ to reproduce the SGP4 dynamics, \nregardless of the integration precision.\n"
ss_AEX_AltName_GEN_0.1: RK4
ls_AEX_Alt_SRC_0.1:
- modules/integrator.py
ss_AEX_Alt_CODE_2: "def RK4(y_i: np.ndarray, dt: float, tf: float, acc_function: Callable[[np.ndarray],\
  \ np.ndarray]):\n    N = int(round(tf / dt))\n    dim = N + 1\n    y = np.zeros((dim,\
  \ 6))\n    y[0, :] = y_i\n\n    import inspect\n    sig = inspect.signature(acc_function)\n\
  \    is_rhs = len(sig.parameters) == 2\n\n    for i in range(N):\n        t = i\
  \ * dt\n        if is_rhs:\n            k1 = acc_function(t, y[i])\n           \
  \ k2 = acc_function(t + 0.5*dt, y[i] + 0.5*dt*k1)\n            k3 = acc_function(t\
  \ + 0.5*dt, y[i] + 0.5*dt*k2)\n            k4 = acc_function(t + dt, y[i] + dt*k3)\n\
  \        else:\n            r, v = y[i, 0:3], y[i, 3:6]\n            k1 = np.concatenate((v,\
  \ acc_function(r)))\n            \n            r2, v2 = r + 0.5*dt*k1[:3], v + 0.5*dt*k1[3:]\n\
  \            k2 = np.concatenate((v2, acc_function(r2)))\n            \n       \
  \     r3, v3 = r + 0.5*dt*k2[:3], v + 0.5*dt*k2[3:]\n            k3 = np.concatenate((v3,\
  \ acc_function(r3)))\n            \n            r4, v4 = r + dt*k3[:3], v + dt*k3[3:]\n\
  \            k4 = np.concatenate((v4, acc_function(r4)))\n\n        y[i + 1] = y[i]\
  \ + (dt / 6.0) * (k1 + 2.0 * k2 + 2.0 * k3 + k4)\n\n    return y\n"
