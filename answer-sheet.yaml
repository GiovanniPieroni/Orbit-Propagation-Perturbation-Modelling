ss_AEX_AltObs_OIC_1.5: "|\n- O1: Plot \"GPD_RK4_Euler.png\" shows that the GPD between\
  \ RK4 and Euler grows to approximately 10^4 km for both the used \ntime steps, and\
  \ it is lower for a smaller dt. In \"GPD_RK4_SGP4.png\", the GPD between RK4 and\
  \ SGP4 reaches ~100 km and is \nessentially identical for both step sizes, although\
  \ for the first ~20 s the GPD for dt = 20.876 s is bigger.\n- O2: In \"Om_RK4_Euler.png\"\
  \ and \"i_RK4_Euler.png\", the RAAN and inclination differences stay at ~10^(-13).\
  \ \nIn \"e_RK4_Euler.png\", RK4 eccentricity remains effectively constant, with\
  \ oscillations of amplitude ~4e-9 for the \ngreatest dt used, whereas Euler orbit's\
  \ eccentricity oscillates with a maximum amplitude of approximately 0.05 for the\n\
  greatest time step.\n- O3: \"CGPD_RK4_Euler.png\" shows that the CGPD decreases\
  \ with decreasing dt: values span from more than 10^4 km  down to \nless than ~4*10\xB3\
  \ km. \"CGPD_RK4_SGP4.png\" instead plateaus near ~50 km for small dts, while the\
  \ lowest value is obtained\nfor the largest dt, at ~42 m.\n"
ss_AEX_AltInt_OIC_2.5: "|\n- I1: The strong growth of GPD in Euler cases originates\
  \ from first-order truncation errors accumulating in the state, while\n RK4 remains\
  \ consistent across the considered dts; the negligible differences in RAAN and inclination\
  \ confirm that, \n using a point-mass gravity model without any perturbation, these\
  \ two keplerian elements are not affected by the \n integration method chosen. By\
  \ contrary, the differences in eccentricity between Euler and RK4 orbit show that\
  \ the Euler\n method introduces a numerical oscillation and RK4 doesn't.\n- I2:\
  \ The CGPD trends reflect convergence of RK4 to the two-body solution with a point-mass\
  \ model and no perturbations. Decreasing dt \nreduces RK4\u2019s own numerical noise,\
  \ but cannot diminish the model discrepancy with SGP4. The small dip at the coarsest\
  \ \ndt is a local numerical artefact rather than an indicator of improved physical\
  \ accuracy.\n"
ss_AEX_AltCon_OIC_4: "|\n- To reduce the truncation error, it is more effective to\
  \ increase the order of the integration model than to decrease \nthe integration\
  \ time. For this reason, an explicit first-order method is reliable only for time\
  \ steps close to machine \nprecision, whereas for a higher-order method, a much\
  \ larger time step is sufficient to achieve a convergent solution.\n"
ss_CEX_Explain_GEN_10: "|\n- Developed a robust TLE caching and retrieval system with\
  \ fallback logic, local storage, NORAD/name matching, \nmalformed-response handling,\
  \ and incremental caching.\n- Vectorised the CartoKep and KeptoCar transformation,\
  \ eliminating loops.\n- Built a reusable plotting framework including matrix-based\
  \ plotting with gradient colours, and generic plotting interfaces.\n- Adopted dataclasses\
  \ for all iteration and storage structures, producing clean, typed, self-documenting\
  \ data.\n- Implemented a layered configuration system (DEFAULTS -> CONFIG.yaml ->\
  \ CLI arguments) with the `pick()` \nselector.\n"
ss_MDT_AI_GEN_0: "|\nI used AI to get help with the syntax, the libraries and the\
  \ yaml file generation. Also, \nplotting functions and secondary functions have\
  \ been refined by AI for better clarity.\n"
