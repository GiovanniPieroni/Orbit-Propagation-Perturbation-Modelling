  \n    ax.tick_params(labelsize=TICK_SIZE)\n\n    # --- ADD ORBITAL PERIOD LABEL\
  \ ---\n    handles, labels = ax.get_legend_handles_labels()\n    handles.append(Line2D([0],\
  \ [0], color='none', label='1T = one orbital period'))\n    labels.append('1T =\
  \ one orbital period')\n\n    # Legend ABOVE axis\n    ax.legend(handles, labels,\
  \ loc='lower center', bbox_to_anchor=(0.5, 1.08),\n              ncol=2, fontsize=LEGEND_SIZE)\n\
  \n    plt.tight_layout()\n    plt.savefig(filename, dpi=300, bbox_inches=\"tight\"\
  )\n    plt.close()\n    return str(filename)\n\n\ndef compute_CGPD(time: np.ndarray,\
  \ GPD: np.ndarray) -> float | Any:\n    \"\"\"\n    Computes the Global Position\
  \ Difference (GPD) between two orbits.\n\n    Parameters:\n        time  : 1xN array\
  \ of time\n        GPD : 1xN array of errors\n\n    Returns:\n        cgpd : Nx1\
  \ array of RMS norms of the GPD\n    \"\"\"\n\n    if time.size != GPD.size:\n \
  \       raise RuntimeError(\"The two vectors have different rows!\\n\")\n\n    mask\
  \ = ~np.isnan(GPD)\n    if not np.any(mask):\n        return np.nan\n\n    GPD_valid\
  \ = GPD[mask]\n    n = GPD_valid.size\n    cgpd = np.linalg.norm(GPD_valid) / np.sqrt(n)\n\
  \    return cgpd\n"
