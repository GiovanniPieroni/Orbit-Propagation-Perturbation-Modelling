ss_REG_GlobErr_CODE_2: "def compute_GPD(r_num: np.ndarray, r_sgp4: np.ndarray) ->\
  \ np.ndarray:\n    \"\"\"\n    Computes the Global Position Difference (GPD) between\
  \ two orbits.\n\n    Parameters:\n        r_num  : Nx3 array of positions from numerical\
  \ integrator (Euler, RK4, etc.)\n        r_sgp4 : Nx3 array of positions from SGP4\
  \ propagation\n\n    Returns:\n        gpd : Nx1 array of L2 norms of the position\
  \ residual at each epoch\n    \"\"\"\n\n    if r_num.shape[0] != r_sgp4.shape[0]:\n\
  \        raise RuntimeError(\"The two vectors have different rows!\\n\")\n    else:\n\
  \        if r_num.shape[1] != r_sgp4.shape[1]:\n            raise RuntimeError(\"\
  The two vectors have different columns!\\n\")\n\n    residual = r_num - r_sgp4 \
  \ # Nx3\n    gpd = np.linalg.norm(residual, axis=1)  # Nx\n    return gpd\n"
