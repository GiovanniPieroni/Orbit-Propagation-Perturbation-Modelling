  \            else:\n                plt.plot(x[k, :], y[k, :], '--', linewidth=1.5,\
  \ label=label_list[k])\n\n    plt.xlabel(xlabel, fontsize=LABEL_SIZE)\n    plt.ylabel(ylabel,\
  \ fontsize=LABEL_SIZE)\n    plt.title(title, fontsize=TITLE_SIZE, y=1.20)\n\n  \
  \  # Minor ticks between powers of 10\n    ax.set_yscale('log')\n    ax.set_xscale('log')\n\
  \    # Configure major and minor log ticks\n    ax.yaxis.set_major_locator(LogLocator(base=10))\n\
  \    ax.yaxis.set_minor_locator(LogLocator(base=10, subs=np.arange(2, 10)))\n\n\
  \    # Draw major and minor grids\n    ax.grid(True, which='major', linewidth=0.8)\n\
  \    ax.grid(True, which='minor', linestyle=':', linewidth=0.5)\n    plt.gca().yaxis.set_minor_locator(LogLocator(base=10.0,\
  \ subs=np.arange(2, 10)))\n    plt.gca().xaxis.set_minor_locator(LogLocator(base=10.0,\
  \ subs=np.arange(2, 10)))\n\n    # plt.grid(True, which='major', linewidth=0.8)\n\
  \    # plt.grid(True, which='minor', linestyle=':', linewidth=0.5)\n    plt.minorticks_on()\n\
